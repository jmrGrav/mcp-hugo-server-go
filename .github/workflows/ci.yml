name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -cover -coverprofile=coverage.out ./internal/...
      - run: go test -race ./...
      - run: go vet ./...
      - name: Coverage gate
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          # Keep the gate aligned with the measured internal package coverage.
          # The repository deliberately excludes non-core packages from the gate to avoid
          # a permanent red badge while the public MCP surface keeps expanding.
          python3 -c "import sys; val=float('${COVERAGE}'); sys.exit(0 if val >= 79 else 1)" || (echo "Coverage ${COVERAGE}% is below 79%"; exit 1)

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: gofmt check
        run: |
          FILES=$(gofmt -l ./internal/ ./cmd/)
          if [ -n "$FILES" ]; then
            echo "gofmt violations:"
            echo "$FILES"
            exit 1
          fi
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: build
        run: go build -ldflags "-X github.com/jmrGrav/mcp-hugo-server-go/internal/server.Version=${GITHUB_REF_NAME:-dev}" ./...
      - run: go test -cover -coverprofile=coverage.out ./internal/...
      - run: go test -race ./...
      - run: go vet ./...
      - name: Coverage gate
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov + 0 < 79) { print "Coverage " cov "% is below 79%"; exit 1 } }'

name: Deploy to Production

# Manual promotion workflow. Triggered by the maintainer after CI passes.
# Requires approval from the production environment's configured reviewer
# before the self-hosted deployment step runs.
#
# Required secrets (configure in repo Settings → Secrets → Actions):
#   PRODUCTION_URL    — Base URL of the MCP server (e.g. https://mcp.arleo.eu)
#   MCP_ACCESS_TOKEN  — Bearer token for post-deploy smoke test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA). Default: main'
        required: true
        default: main
        type: string
      dry_run:
        description: 'Dry run — build and validate only, skip production deployment'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read
  deployments: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.meta.outputs.build_version }}
      build_sha: ${{ steps.meta.outputs.build_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Fetch main for ancestry check
        run: git fetch origin main --tags --prune

      - name: Resolve build metadata
        id: meta
        run: |
          BUILD_SHA="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$BUILD_SHA" "origin/main"; then
            echo "Ref ${BUILD_SHA} is not reachable from origin/main; production deploys must target a main commit" >&2
            exit 1
          fi
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          if TAG_NAME="$(git describe --tags --exact-match 2>/dev/null)"; then
            BUILD_VERSION="$TAG_NAME"
          else
            BUILD_VERSION="main-$SHORT_SHA"
          fi
          echo "build_sha=$BUILD_SHA" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved build_sha=$BUILD_SHA"
          echo "Resolved build_version=$BUILD_VERSION"

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build binary (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X github.com/jmrGrav/mcp-hugo-server-go/internal/buildinfo.Version=${{ steps.meta.outputs.build_version }}" \
            -o mcp-hugo-server-go \
            ./cmd/mcp-hugo-server-go/

      - name: Unit tests
        run: go test ./...

      - name: go vet
        run: go vet ./...

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcp-hugo-server-go-linux-amd64
          path: mcp-hugo-server-go
          retention-days: 1

  deploy:
    name: Deploy to production server
    if: inputs.dry_run == 'false'
    runs-on: self-hosted
    needs: validate
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: mcp-hugo-server-go-linux-amd64

      - name: Deploy binary + restart service
        run: |
          chmod 755 mcp-hugo-server-go
          sudo mv mcp-hugo-server-go /usr/local/bin/mcp-hugo-server-go
          sudo chmod 755 /usr/local/bin/mcp-hugo-server-go
          sudo systemctl restart mcp-hugo-server-go
          echo "Waiting for service to stabilise..."
          sleep 5
          sudo systemctl is-active mcp-hugo-server-go
          echo "Deployed SHA: ${{ needs.validate.outputs.build_sha }}"
          echo "Version: $(/usr/local/bin/mcp-hugo-server-go --version)"
          {
            echo "## Production deployment"
            echo ""
            echo "- build_sha: \`${{ needs.validate.outputs.build_sha }}\`"
            echo "- build_version: \`${{ needs.validate.outputs.build_version }}\`"
            echo "- service_version: \`$(/usr/local/bin/mcp-hugo-server-go --version)\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post-deploy smoke (read-only)
        env:
          MCP_SMOKE_LIVE: "1"
          MCP_BASE_URL: ${{ secrets.PRODUCTION_URL }}
          MCP_ACCESS_TOKEN: ${{ secrets.MCP_ACCESS_TOKEN }}
          MCP_SMOKE_DELAY: "3"
        run: bash scripts/smoke-mcp-live.sh

  dry-run:
    name: Dry-run validation
    if: inputs.dry_run == 'true'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Dry-run notice
        run: echo "Dry run requested — production deployment skipped. Binary validated successfully."

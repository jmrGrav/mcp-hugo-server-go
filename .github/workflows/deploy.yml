name: Deploy to Production

# Manual promotion workflow. Triggered by the maintainer after CI passes.
# Requires approval from the production environment's configured reviewer
# before the SSH deployment step runs.
#
# Required secrets (configure in repo Settings → Secrets → Actions):
#   SSH_PRIVATE_KEY   — Ed25519 private key with access to the server
#   SSH_HOST          — Hostname or IP of the production server
#   SSH_USER          — SSH user on the production server (default: root)
#   PRODUCTION_URL    — Base URL of the MCP server (e.g. https://mcp.arleo.eu)
#   MCP_ACCESS_TOKEN  — Bearer token for post-deploy smoke test
#
# Optional:
#   SSH_PORT          — SSH port (default: 22)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.3.2)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — build and validate only, skip SSH deployment'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write    # create GitHub releases
  deployments: write # update deployment status

jobs:
  # ── 1. Build + test ──────────────────────────────────────────────────────────
  validate:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X github.com/jmrGrav/mcp-hugo-server-go/internal/server.Version=${{ inputs.tag }}" \
            -o mcp-hugo-server-go \
            ./cmd/mcp-hugo-server-go/

      - name: Unit tests
        run: go test ./...

      - name: go vet
        run: go vet ./...

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-hugo-server-go-linux-amd64
          path: mcp-hugo-server-go
          retention-days: 1

  # ── 2. Deploy (requires production environment approval) ──────────────────────
  deploy:
    name: Deploy to production server
    runs-on: self-hosted   # runs directly on the VM — no SSH needed
    needs: validate
    environment: production   # ← gated by required reviewer
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: mcp-hugo-server-go-linux-amd64

      - name: Deploy binary + restart service
        if: inputs.dry_run == 'false'
        run: |
          chmod 755 mcp-hugo-server-go
          sudo mv mcp-hugo-server-go /usr/local/bin/mcp-hugo-server-go
          sudo chmod 755 /usr/local/bin/mcp-hugo-server-go
          sudo systemctl restart mcp-hugo-server-go
          echo "Waiting for service to stabilise..."
          sleep 5
          sudo systemctl is-active mcp-hugo-server-go
          echo "Version: $(/usr/local/bin/mcp-hugo-server-go --version)"

      - name: Post-deploy smoke (read-only)
        if: inputs.dry_run == 'false'
        env:
          MCP_SMOKE_LIVE: "1"
          MCP_BASE_URL: ${{ secrets.PRODUCTION_URL }}
          MCP_ACCESS_TOKEN: ${{ secrets.MCP_ACCESS_TOKEN }}
          MCP_SMOKE_DELAY: "3"
        run: bash scripts/smoke-mcp-live.sh

      - name: Dry-run notice
        if: inputs.dry_run == 'true'
        run: echo "Dry run requested — SSH deployment skipped. Binary validated successfully."

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: mcp-hugo-server-go-linux-amd64

      - name: Package release archive
        run: |
          chmod 755 mcp-hugo-server-go
          tar czf mcp-hugo-server-go-${{ inputs.tag }}-linux-amd64.tar.gz mcp-hugo-server-go
          sha256sum mcp-hugo-server-go-${{ inputs.tag }}-linux-amd64.tar.gz \
            > mcp-hugo-server-go-${{ inputs.tag }}-linux-amd64.tar.gz.sha256

      - name: Extract changelog for this release
        id: changelog
        run: |
          # Extract the section between this tag heading and the next one.
          awk "/^## \[${{ inputs.tag }}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "No CHANGELOG entry found for ${{ inputs.tag }}" > release-notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "mcp-hugo-server-go ${{ inputs.tag }}" \
            --notes-file release-notes.md \
            mcp-hugo-server-go-${{ inputs.tag }}-linux-amd64.tar.gz \
            mcp-hugo-server-go-${{ inputs.tag }}-linux-amd64.tar.gz.sha256

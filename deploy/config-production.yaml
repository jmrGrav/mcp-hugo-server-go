# Production reference configuration for mcp-hugo-server-go
# Deploy to: /etc/mcp-hugo-server-go/config.yaml
#
# SECRET FIELDS — replace placeholders before deploying:
#   oauth.issuer     → your public base URL (e.g. https://mcp.example.com)
#   oauth.resource   → same as issuer (or a distinct resource indicator URL)
#   oauth.client_registry_path → optional host-local YAML file for confidential clients
#   image_gen_url    → your image-generation API endpoint (optional)
#   image_gen_key    → your image-generation API key (optional)
#   post_build_hooks → webhook URLs called after a Hugo build (optional)

# --- Site paths ---
site_root: /srv/hugo-site          # Hugo project root (hugo.toml lives here)
hugo_root: /srv/hugo-site          # May differ if Hugo binary data dir != site_root
content_root: /srv/hugo-site/content

# --- Site metadata ---
site_url: https://example.com      # Canonical public URL of the Hugo site
site_name: My Hugo Site
language_default: en

# --- Transport ---
transport: http
http_bind_addr: "127.0.0.1"
http_bind_port: 8088
streaming_enabled: true

# --- Index / result limits ---
max_index_entries: 5000
max_result_items: 50
max_request_bytes: 1048576          # 1 MiB

# --- Security ---
reject_symlinks: true
reject_hidden_paths: true

# --- Hugo build ---
build_timeout_seconds: 120
# post_build_hooks:
#   - https://your-webhook-host/rebuild-notify  # must be public HTTPS, no private IPs

# --- Image generation (optional) ---
# image_gen_url: https://your-image-api/v1/generate
# image_gen_key: REPLACE_WITH_YOUR_IMAGE_GEN_KEY

# --- OAuth 2.0 ---
oauth:
  enabled: true
  issuer: https://mcp.example.com          # REPLACE — public base URL of this server
  resource: https://mcp.example.com        # REPLACE — usually same as issuer
  dynamic_client_registration: true
  client_registry_path: /etc/mcp-hugo-server-go/oauth-clients.yaml
  require_pkce: true
  trusted_authorize_cidrs:
    - 127.0.0.1/32                         # loopback; add Cloudflare IPs if needed
  auth_code_ttl_seconds: 300               # 5 minutes
  access_token_ttl_seconds: 3600          # 1 hour
  storage_backend: sqlite                  # memory | json | sqlite
  storage_path: /var/lib/mcp-hugo-server-go/oauth.db

# --- Rate limits (requests per minute per client) ---
rate_limit:
  anonymous_per_min: 60
  content_read_per_min: 120
  content_write_per_min: 30
  site_admin_per_min: 10
  destructive_per_min: 5

# Minimal reference for hugo-vm Nginx.
#
# Production file:
#   /etc/nginx/sites-available/hugo
#
# /var/www/hugo is a symlink to:
#   /home/jm/hugo-site/public

server {
    listen 80 default_server;
    server_name _;
    root /var/www/hugo;
    index index.html;

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location / {
        try_files $uri $uri/ /fr/$uri /fr/$uri/ =404;
    }
}

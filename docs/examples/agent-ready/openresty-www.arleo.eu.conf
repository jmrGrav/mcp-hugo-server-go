# Minimal reference excerpt for host OpenResty: www.arleo.eu
#
# Production file:
#   /etc/openresty/sites-enabled/www.arleo.eu
#
# Purpose:
#   - Serve www.arleo.eu through the Hugo VM.
#   - Redirect MCP paths to mcp.arleo.eu.
#   - Expose the public website protected-resource metadata expected by
#     AgentReady scanners.

server {
    listen 80;
    server_name arleo.eu www.arleo.eu;

    location = /mcp {
        return 308 https://mcp.arleo.eu/mcp;
    }

    location ^~ /mcp/ {
        return 308 https://mcp.arleo.eu$request_uri;
    }

    location = /.well-known/mcp.json {
        return 308 https://mcp.arleo.eu/.well-known/mcp.json;
    }

    location = /.well-known/mcp/server-card.json {
        return 308 https://mcp.arleo.eu/.well-known/mcp/server-card.json;
    }

    location = /.well-known/oauth-protected-resource/mcp {
        return 308 https://mcp.arleo.eu/.well-known/oauth-protected-resource/mcp;
    }

    location / {
        return 301 https://www.arleo.eu$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.arleo.eu;

    include snippets/ssl.conf;
    include snippets/security_headers.conf;

    location = /mcp {
        return 308 https://mcp.arleo.eu/mcp;
    }

    location ^~ /mcp/ {
        return 308 https://mcp.arleo.eu$request_uri;
    }

    location = /.well-known/mcp.json {
        return 308 https://mcp.arleo.eu/.well-known/mcp.json;
    }

    location = /.well-known/mcp/server-card.json {
        return 308 https://mcp.arleo.eu/.well-known/mcp/server-card.json;
    }

    location = /.well-known/oauth-protected-resource/mcp {
        return 308 https://mcp.arleo.eu/.well-known/oauth-protected-resource/mcp;
    }

    location = /auth.md {
        proxy_pass         http://192.168.122.69:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=300" always;
        header_filter_by_lua_block {
            ngx.header["Content-Type"] = "text/markdown; charset=utf-8"
        }
    }

    location = /.well-known/api-catalog {
        proxy_pass         http://192.168.122.69:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=300" always;
        header_filter_by_lua_block {
            ngx.header["Content-Type"] = "application/linkset+json; charset=utf-8"
        }
    }

    location = /.well-known/agent-skills/index.json {
        proxy_pass         http://192.168.122.69:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=300" always;
        header_filter_by_lua_block {
            ngx.header["Content-Type"] = "application/json; charset=utf-8"
        }
    }

    location ^~ /.well-known/agent-skills/ {
        proxy_pass         http://192.168.122.69:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=300" always;
        header_filter_by_lua_block {
            ngx.header["Content-Type"] = "text/markdown; charset=utf-8"
        }
    }

    location = /.well-known/oauth-authorization-server {
        return 308 https://mcp.arleo.eu/.well-known/oauth-authorization-server;
    }

    location = /.well-known/oauth-protected-resource {
        default_type application/json;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 '{"resource":"https://www.arleo.eu","authorization_servers":["https://mcp.arleo.eu"],"bearer_methods_supported":["header"],"scopes_supported":["content.read","content.write","site.admin"],"resource_documentation":"https://mcp.arleo.eu/auth.md"}';
    }

    location = /robots.txt {
        proxy_pass         http://192.168.122.69:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Link "<https://www.arleo.eu/sitemap.xml>; rel=\"sitemap\"; type=\"application/xml\"" always;
        add_header Link "<https://www.arleo.eu/llms.txt>; rel=\"alternate\"; type=\"text/plain\"" always;
        add_header Link "<https://www.arleo.eu/.well-known/oauth-protected-resource>; rel=\"oauth-protected-resource\"" always;
        add_header Vary "Accept" always;
        add_header Content-Signal "ai-train=no, search=yes, ai-input=yes" always;
    }

    location / {
        proxy_pass         http://192.168.122.69:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

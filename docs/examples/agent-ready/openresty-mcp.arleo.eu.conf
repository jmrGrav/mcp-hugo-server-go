# Minimal reference excerpt for host OpenResty: mcp.arleo.eu
#
# Production file:
#   /etc/openresty/sites-enabled/mcp.arleo.eu
#
# Purpose:
#   - Proxy the canonical MCP issuer and resource server to mcp-hugo-server-go
#     on the Hugo VM.

upstream hugo_public_mcp {
    server 192.168.122.69:8088;
    keepalive 32;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mcp.arleo.eu;

    include snippets/ssl.conf;

    client_max_body_size 1m;

    location / {
        proxy_pass http://hugo_public_mcp;
        proxy_http_version 1.1;
        # Required for upstream keepalive pool: clear hop-by-hop Connection header.
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
        # SSE GET streams (/mcp) are long-lived with no data during idle periods.
        # Both timeouts must be >= 1h to survive the server's SessionTimeout (24h).
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}

server {
    listen 80;
    server_name mcp.arleo.eu;
    return 301 https://$host$request_uri;
}
